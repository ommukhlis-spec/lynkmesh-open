name: LynkMesh X Scheduler

on:
  schedule:
    # Contoh: Jalan tiap jam 9 pagi WIB (jam 2 UTC)
    - cron: '0 2 * * *'
  workflow_dispatch: # Biar lo bisa tes jalanin manual lewat tombol di GitHub

jobs:
  tweet:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Penting biar script bisa update file JSON
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install tweepy

      - name: Run Tweet Script
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python scripts/tweet_worker.py

      - name: Commit Changes # Biar antrean di JSON ter-update
        run: |
          git config --global user.name "LynkMesh-Bot"
          git config --global user.email "bot@lynkmesh.ai"
          git add content/posts.json
          git commit -m "Update post queue [skip ci]" || echo "No changes to commit"
          git push
